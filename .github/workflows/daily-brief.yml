name: A-share portfolio daily brief

on:
  schedule:
    - cron: "57 0 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate daily brief
        run: python portfolio-intelligence/scripts/run_daily_brief.py

      - name: Email latest HTML report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: geanya@me.com
        run: python portfolio-intelligence/scripts/send_latest_email.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-brief-${{ github.run_id }}
          path: |
            portfolio-intelligence/reports/
            portfolio-intelligence/ui/latest.html
            portfolio-intelligence/ui/*.html
          retention-days: 30

      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portfolio-intelligence/reports portfolio-intelligence/ui
          if git diff --cached --quiet; then
            echo "No generated report changes to commit."
          else
            git commit -m "Generate daily portfolio brief"
            git pull --rebase origin main
            git push
          fi
